# ConfiguraÁıes de Conex„o com o Oracle FIAP
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL

# Swagger e OpenAPI
quarkus.swagger-ui.path=/swagger
quarkus.smallrye-openapi.info-title=Simple Manager - Turma do Bem
quarkus.smallrye-openapi.info-version=1.0.0

# CORS Global e FlexÌvel
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET, PUT, POST, DELETE, OPTIONS
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with, role

